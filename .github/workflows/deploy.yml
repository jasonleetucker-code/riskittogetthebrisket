name: Deploy Production

on:
  push:
    branches:
      - main
    # Skip deploy for data-only commits from scheduled-refresh.
    # Data flows to production via the server's own scrape loop, not via git deploy.
    paths-ignore:
      - 'data/**'
      - 'exports/**'
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Optional git ref (commit/tag/branch) to deploy. Default is current commit."
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Build Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (requirements.txt)
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -f "requirements.txt" ]] || { echo "::error title=Missing Python manifest::requirements.txt is required for production deploy dependency installation."; exit 1; }
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m py_compile server.py "Dynasty Scraper.py"
          python -m py_compile src/api/data_contract.py

      - name: Python runtime import gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import fastapi  # noqa: F401
          import uvicorn  # noqa: F401
          import requests  # noqa: F401
          from playwright.async_api import async_playwright  # noqa: F401
          import server  # noqa: F401
          print("Runtime import gate passed.")
          PY

      - name: Run unit tests
        shell: bash
        run: |
          set -Eeuo pipefail
          pip install pytest
          python -m pytest tests/ -x -q --tb=short

      - name: API data contract check (if sample data exists)
        shell: bash
        run: |
          set -Eeuo pipefail
          if ls dynasty_data_*.json >/dev/null 2>&1 || ls data/dynasty_data_*.json >/dev/null 2>&1; then
            python scripts/validate_api_contract.py --repo .
          else
            echo "No dynasty_data_*.json sample found; skipping contract validation."
          fi

      - name: Validate required deploy artifacts exist
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ ! -f "deploy/deploy.sh" ]]; then
            echo "::error title=Missing required deploy script::deploy/deploy.sh is required by the deploy job remote execution path but does not exist in this repository."
            echo "::error::Either add deploy/deploy.sh or update deploy strategy/path in .github/workflows/deploy.yml."
            exit 1
          fi
          if [[ ! -f "requirements.txt" ]]; then
            echo "::error title=Missing Python manifest::requirements.txt is required for production deploy dependency installation."
            exit 1
          fi

      - name: Deploy script syntax gate (existing scripts only)
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n "deploy/deploy.sh"

          for script in deploy/*.sh; do
            [[ -f "${script}" ]] || continue
            [[ "${script}" == "deploy/deploy.sh" ]] && continue
            bash -n "${script}"
          done

  deploy:
    name: Deploy To Hetzner
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 25
    environment: production
    steps:
      - name: Preflight validate deploy inputs (no SSH)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          PROD_APP_DIR: ${{ vars.PROD_APP_DIR || '/home/dynasty/trade-calculator' }}
          PROD_VENV_DIR: ${{ vars.PROD_VENV_DIR || '/home/dynasty/.venvs/trade-calculator' }}
          PROD_DEPLOY_STATE_DIR: ${{ vars.PROD_DEPLOY_STATE_DIR || '/home/dynasty/.deploy-state' }}
          PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE: ${{ vars.PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE || '/home/dynasty/.deploy-state/trade-calculator.last_successful_deploy_commit' }}
          PROD_SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || 'dynasty' }}
        shell: bash
        run: |
          set -Eeuo pipefail

          require_non_empty() {
            local name="$1"
            local value="${!name:-}"
            if [[ -z "${value}" ]]; then
              echo "::error title=Missing Deploy Configuration::Required secret ${name} is empty or not set."
              exit 1
            fi
          }

          require_non_empty DEPLOY_HOST
          require_non_empty DEPLOY_USER
          require_non_empty DEPLOY_SSH_PRIVATE_KEY
          require_non_empty DEPLOY_KNOWN_HOSTS

          DEPLOY_HOST_RESOLVED="${DEPLOY_HOST}"
          DEPLOY_USER_RESOLVED="${DEPLOY_USER}"
          DEPLOY_PORT_RESOLVED="${DEPLOY_PORT:-22}"
          DEPLOY_KEY_RESOLVED="${DEPLOY_SSH_PRIVATE_KEY}"
          DEPLOY_KNOWN_HOSTS_RESOLVED="${DEPLOY_KNOWN_HOSTS}"

          if ! [[ "${DEPLOY_PORT_RESOLVED}" =~ ^[0-9]+$ ]]; then
            echo "::error title=Invalid SSH Port::Resolved deploy port must be numeric; got '${DEPLOY_PORT_RESOLVED}'."
            exit 1
          fi

          if ! grep -Eq 'BEGIN [A-Z0-9 ]*PRIVATE KEY' <<<"${DEPLOY_KEY_RESOLVED}"; then
            echo "::error title=Invalid SSH private key::Key does not look like a PEM/OpenSSH private key."
            exit 1
          fi

          if ! grep -Eq '(^|[[:space:]])(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp[0-9]+)|^\|1\|' <<<"${DEPLOY_KNOWN_HOSTS_RESOLVED}"; then
            echo "::error title=Invalid known_hosts::Known hosts data is missing a valid host key entry."
            exit 1
          fi

          [[ -n "${DEPLOY_PORT:-}" ]] || echo "DEPLOY_PORT not set; defaulting to 22."

          install -d -m 700 "$HOME/.ssh"
          DEPLOY_KEY_FILE="$HOME/.ssh/id_ed25519"
          DEPLOY_KNOWN_HOSTS_FILE="$HOME/.ssh/known_hosts"

          printf '%s\n' "${DEPLOY_KEY_RESOLVED}" | sed 's/\r$//' > "${DEPLOY_KEY_FILE}"
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS_RESOLVED}" | sed 's/\r$//' > "${DEPLOY_KNOWN_HOSTS_FILE}"

          chmod 600 "${DEPLOY_KEY_FILE}"
          chmod 644 "${DEPLOY_KNOWN_HOSTS_FILE}"

          ssh-keygen -y -f "${DEPLOY_KEY_FILE}" >/dev/null
          [[ -s "${DEPLOY_KNOWN_HOSTS_FILE}" ]] || { echo "::error title=known_hosts empty::Known hosts secret resolved to an empty file."; exit 1; }

          echo "Deploy key fingerprint:"
          ssh-keygen -lf "${DEPLOY_KEY_FILE}"
          ssh-keygen -y -f "${DEPLOY_KEY_FILE}" > /tmp/deploy_key.pub
          echo "Derived public key fingerprint:"
          ssh-keygen -lf /tmp/deploy_key.pub

          {
            echo "DEPLOY_HOST_RESOLVED=${DEPLOY_HOST_RESOLVED}"
            echo "DEPLOY_USER_RESOLVED=${DEPLOY_USER_RESOLVED}"
            echo "DEPLOY_PORT_RESOLVED=${DEPLOY_PORT_RESOLVED}"
            echo "DEPLOY_KEY_FILE=${DEPLOY_KEY_FILE}"
            echo "DEPLOY_KNOWN_HOSTS_FILE=${DEPLOY_KNOWN_HOSTS_FILE}"
          } >> "$GITHUB_ENV"

          echo "Deploy target: ${DEPLOY_USER_RESOLVED}@${DEPLOY_HOST_RESOLVED}:${DEPLOY_PORT_RESOLVED}"
          echo "Remote app dir: ${PROD_APP_DIR}"
          echo "Remote venv dir: ${PROD_VENV_DIR}"
          echo "Remote deploy state dir: ${PROD_DEPLOY_STATE_DIR}"
          echo "Remote last successful deploy file: ${PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE}"
          echo "Remote service: ${PROD_SERVICE_NAME}"

      - name: Validate known_hosts entry for target host
        shell: bash
        run: |
          set -Eeuo pipefail
          SSH_PORT="${DEPLOY_PORT_RESOLVED}"
          TARGET_HOST="${DEPLOY_HOST_RESOLVED}"

          if [[ "${SSH_PORT}" == "22" ]]; then
            LOOKUP="${TARGET_HOST}"
          else
            LOOKUP="[${TARGET_HOST}]:${SSH_PORT}"
          fi

          if ! ssh-keygen -F "${LOOKUP}" -f "${DEPLOY_KNOWN_HOSTS_FILE}" >/dev/null 2>&1; then
            echo "::error title=Host key mismatch::No known_hosts entry found for ${LOOKUP}. Recreate DEPLOY_KNOWN_HOSTS with: ssh-keyscan -H -p ${SSH_PORT} ${TARGET_HOST}"
            exit 1
          fi

      - name: SSH preflight (connectivity + remote paths)
        env:
          APP_DIR: ${{ vars.PROD_APP_DIR || '/home/dynasty/trade-calculator' }}
          VENV_DIR: ${{ vars.PROD_VENV_DIR || '/home/dynasty/.venvs/trade-calculator' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "${APP_DIR}" ]] || { echo "::error title=Missing APP_DIR::PROD_APP_DIR cannot be empty."; exit 1; }
          [[ -n "${VENV_DIR}" ]] || { echo "::error title=Missing VENV_DIR::PROD_VENV_DIR cannot be empty."; exit 1; }

          SSH_PORT="${DEPLOY_PORT_RESOLVED}"
          TARGET="${DEPLOY_USER_RESOLVED}@${DEPLOY_HOST_RESOLVED}"

          echo "Testing SSH connectivity to ${TARGET}:${SSH_PORT}"
          ssh \
            -i "${DEPLOY_KEY_FILE}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${DEPLOY_KNOWN_HOSTS_FILE}" \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${SSH_PORT}" \
            "${TARGET}" \
            "set -Eeuo pipefail; \
             echo '[remote] pwd:'; pwd; \
             echo \"[remote] connected host=\$(hostname) user=\$(id -un)\"; \
             command -v bash >/dev/null || { echo \"[remote] bash not found\" >&2; exit 11; }; \
             command -v git >/dev/null || { echo \"[remote] git not found\" >&2; exit 16; }; \
             command -v python3 >/dev/null || { echo \"[remote] python3 not found\" >&2; exit 17; }; \
             [[ -d '${APP_DIR}' ]] || { echo \"[remote] APP_DIR missing: ${APP_DIR}\" >&2; exit 12; }; \
             [[ -d '${APP_DIR}/.git' ]] || { echo \"[remote] APP_DIR is not a git repo: ${APP_DIR}\" >&2; exit 13; }; \
             echo '[remote] git top-level:'; git -C '${APP_DIR}' rev-parse --show-toplevel; \
             echo '[remote] git status --short:'; git -C '${APP_DIR}' status --short || true; \
             command -v systemctl >/dev/null || { echo \"[remote] systemctl not found\" >&2; exit 15; }; \
             command -v sudo >/dev/null || { echo \"[remote] sudo not found\" >&2; exit 18; }; \
             ( [[ -x /bin/systemctl ]] && sudo -n /bin/systemctl --version >/dev/null 2>&1 ) || ( [[ -x /usr/bin/systemctl ]] && sudo -n /usr/bin/systemctl --version >/dev/null 2>&1 ) || { echo \"[remote] missing NOPASSWD sudo permission for systemctl (/bin/systemctl or /usr/bin/systemctl)\" >&2; exit 19; }; \
             ( [[ -x /bin/journalctl ]] && sudo -n /bin/journalctl --version >/dev/null 2>&1 ) || ( [[ -x /usr/bin/journalctl ]] && sudo -n /usr/bin/journalctl --version >/dev/null 2>&1 ) || { echo \"[remote] missing NOPASSWD sudo permission for journalctl (/bin/journalctl or /usr/bin/journalctl)\" >&2; exit 20; }; \
             ( [[ -x /usr/bin/install ]] && sudo -n /usr/bin/install --version >/dev/null 2>&1 ) || ( [[ -x /bin/install ]] && sudo -n /bin/install --version >/dev/null 2>&1 ) || { echo \"[remote] missing NOPASSWD sudo permission for install (/usr/bin/install or /bin/install)\" >&2; exit 21; }; \
             echo '[remote] preflight checks passed'"

      - name: Run remote deploy script
        env:
          DEPLOY_REF_INPUT: ${{ github.event.inputs.deploy_ref }}
          APP_NAME: ${{ vars.PROD_APP_NAME || 'riskittogetthebrisket' }}
          APP_USER: ${{ vars.PROD_APP_USER || 'dynasty' }}
          APP_DIR: ${{ vars.PROD_APP_DIR || '/home/dynasty/trade-calculator' }}
          VENV_DIR: ${{ vars.PROD_VENV_DIR || '/home/dynasty/.venvs/trade-calculator' }}
          DEPLOY_STATE_DIR: ${{ vars.PROD_DEPLOY_STATE_DIR || '/home/dynasty/.deploy-state' }}
          LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE: ${{ vars.PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE || '/home/dynasty/.deploy-state/trade-calculator.last_successful_deploy_commit' }}
          SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || 'dynasty' }}
          DEPLOY_BRANCH: ${{ vars.PROD_DEPLOY_BRANCH || 'main' }}
          AUTO_ROLLBACK: ${{ vars.PROD_AUTO_ROLLBACK || 'true' }}
          APP_HOST: ${{ vars.PROD_APP_HOST || '127.0.0.1' }}
          APP_PORT: ${{ vars.PROD_APP_PORT || '8000' }}
          STRICT_LOCAL_HEALTH: ${{ vars.PROD_STRICT_LOCAL_HEALTH || 'false' }}
          PUBLIC_URL: ${{ vars.PROD_PUBLIC_URL || '' }}
        shell: bash
        run: |
          set -Eeuo pipefail

          DEPLOY_REF="${DEPLOY_REF_INPUT:-${GITHUB_SHA}}"
          [[ -n "${DEPLOY_REF}" ]] || { echo "::error title=Missing DEPLOY_REF::Unable to determine deploy ref."; exit 1; }

          if [[ "${DEPLOY_REF}" =~ [[:space:]] ]]; then
            echo "::error title=Invalid DEPLOY_REF::deploy_ref cannot contain whitespace."
            exit 1
          fi

          SSH_PORT="${DEPLOY_PORT_RESOLVED}"
          TARGET="${DEPLOY_USER_RESOLVED}@${DEPLOY_HOST_RESOLVED}"

          echo "Deploying ref '${DEPLOY_REF}' to ${TARGET}:${SSH_PORT}"
          ssh \
            -i "${DEPLOY_KEY_FILE}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${DEPLOY_KNOWN_HOSTS_FILE}" \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${SSH_PORT}" \
            "${TARGET}" \
            "bash -s" <<EOF
          set -Eeuo pipefail
          export APP_NAME="${APP_NAME}"
          export APP_USER="${APP_USER}"
          export APP_DIR="${APP_DIR}"
          export VENV_DIR="${VENV_DIR}"
          export DEPLOY_STATE_DIR="${DEPLOY_STATE_DIR}"
          export LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE="${LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE}"
          export SERVICE_NAME="${SERVICE_NAME}"
          export DEPLOY_BRANCH="${DEPLOY_BRANCH}"
          export DEPLOY_REF="${DEPLOY_REF}"
          export AUTO_ROLLBACK="${AUTO_ROLLBACK}"
          export APP_HOST="${APP_HOST}"
          export APP_PORT="${APP_PORT}"
          export STRICT_LOCAL_HEALTH="${STRICT_LOCAL_HEALTH}"
          export PUBLIC_URL="${PUBLIC_URL}"

          [[ -n "\${APP_DIR}" ]] || { echo "[remote] APP_DIR is empty" >&2; exit 20; }
          [[ -d "\${APP_DIR}/.git" ]] || { echo "[remote] APP_DIR is not a git repo: \${APP_DIR}" >&2; exit 21; }

          if [[ ! -f "\${APP_DIR}/deploy/deploy.sh" ]]; then
            echo "[remote] deploy/deploy.sh missing before run; attempting git bootstrap."
            git -C "\${APP_DIR}" fetch --prune --tags origin
            if git -C "\${APP_DIR}" rev-parse --verify --quiet "\${DEPLOY_REF}^{commit}" >/dev/null; then
              git -C "\${APP_DIR}" checkout --force "\${DEPLOY_REF}"
            elif git -C "\${APP_DIR}" rev-parse --verify --quiet "origin/\${DEPLOY_BRANCH}^{commit}" >/dev/null; then
              git -C "\${APP_DIR}" checkout --force "origin/\${DEPLOY_BRANCH}"
            else
              echo "[remote] Unable to resolve \${DEPLOY_REF} or origin/\${DEPLOY_BRANCH} during bootstrap." >&2
              exit 22
            fi
          fi

          [[ -f "\${APP_DIR}/deploy/deploy.sh" ]] || { echo "[remote] Missing deploy script after bootstrap: \${APP_DIR}/deploy/deploy.sh" >&2; exit 23; }
          bash "\${APP_DIR}/deploy/deploy.sh"
          EOF

      - name: Post-deploy smoke test
        if: ${{ vars.PROD_PUBLIC_URL != '' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          URL="${{ vars.PROD_PUBLIC_URL }}"
          URL="${URL%/}"
          PASS=0
          FAIL=0

          check_endpoint() {
            local path="$1"
            local expect_code="${2:-200}"
            local full_url="${URL}${path}"
            local code
            code=$(curl --silent --show-error --output /dev/null \
              --write-out '%{http_code}' --max-time 15 "${full_url}" || echo "000")
            if [[ "${code}" == "${expect_code}" ]]; then
              echo "PASS: ${path} -> ${code}"
              PASS=$((PASS + 1))
            else
              echo "FAIL: ${path} -> ${code} (expected ${expect_code})"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "=== Post-Deploy Smoke Test ==="
          echo "Target: ${URL}"

          check_endpoint "/api/health" 200
          check_endpoint "/api/status" 200
          check_endpoint "/api/data" 200
          check_endpoint "/" 200

          echo ""
          echo "Results: ${PASS} passed, ${FAIL} failed"

          if [[ "${FAIL}" -gt 0 ]]; then
            echo "::error title=Post-Deploy Smoke Failure::${FAIL} endpoint(s) failed after deploy."
            exit 1
          fi

      - name: Validate live data contract
        if: ${{ vars.PROD_PUBLIC_URL != '' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          URL="${{ vars.PROD_PUBLIC_URL }}"
          URL="${URL%/}"

          curl --silent --show-error --max-time 20 "${URL}/api/health" > /tmp/health.json

          python3 - <<'PY'
          import json, sys
          with open("/tmp/health.json") as f:
              data = json.load(f)
          status = data.get("status", "unknown")
          has_data = data.get("has_data", False)
          stale = data.get("data_stale", True)
          print(f"  status={status} has_data={has_data} data_stale={stale}")
          if status not in ("ok", "degraded"):
              print("::error title=Unexpected health status::Health returned unexpected status.")
              sys.exit(1)
          if not has_data:
              print("::warning title=No data loaded::Server reports no data loaded.")
          print("Post-deploy health validation passed.")
          PY
