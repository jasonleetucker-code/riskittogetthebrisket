name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Optional git ref (commit/tag/branch) to deploy. Default is current commit."
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Build Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate League shell artifacts are tracked
        shell: bash
        run: |
          set -Eeuo pipefail
          required_assets=(
            "Static/league/index.html"
            "Static/league/league.css"
            "Static/league/league.js"
          )
          for rel in "${required_assets[@]}"; do
            if [[ ! -f "${rel}" ]]; then
              echo "::error title=Missing League shell artifact::${rel} is required for reproducible public League UX."
              exit 1
            fi
            if ! git ls-files --error-unmatch "${rel}" >/dev/null 2>&1; then
              echo "::error title=Untracked League shell artifact::${rel} exists but is not source-controlled."
              exit 1
            fi
          done
          echo "League shell source-control readiness check passed."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve Python dependency manifest
        id: pydeps
        shell: bash
        run: |
          set -Eeuo pipefail
          DEP_FILE=""
          if [[ -f "requirements-prod.txt" ]]; then
            DEP_FILE="requirements-prod.txt"
          elif [[ -f "requirements.txt" ]]; then
            DEP_FILE="requirements.txt"
          elif [[ -f "requirements-dev.txt" ]]; then
            DEP_FILE="requirements-dev.txt"
          fi

          if [[ -z "${DEP_FILE}" ]]; then
            echo "No requirements*.txt file found at repo root; skipping dependency install for validation job."
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          else
            echo "mode=requirements" >> "$GITHUB_OUTPUT"
            echo "dep_file=${DEP_FILE}" >> "$GITHUB_OUTPUT"
            echo "Using Python manifest: ${DEP_FILE}"
          fi

      - name: Install dependencies (requirements)
        if: ${{ steps.pydeps.outputs.mode == 'requirements' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          DEP_FILE="${{ steps.pydeps.outputs.dep_file }}"
          [[ -n "${DEP_FILE}" ]] || { echo "::error title=Dependency file missing::Manifest path not set after preflight."; exit 1; }
          [[ -f "${DEP_FILE}" ]] || { echo "::error title=Dependency file missing::${DEP_FILE} does not exist in repository root."; exit 1; }
          pip install -r "${DEP_FILE}"

      - name: Python syntax gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m py_compile server.py "Dynasty Scraper.py"
          python -m py_compile src/api/data_contract.py

      - name: API data contract check (if sample data exists)
        shell: bash
        run: |
          set -Eeuo pipefail
          if ls dynasty_data_*.json >/dev/null 2>&1 || ls data/dynasty_data_*.json >/dev/null 2>&1; then
            python scripts/validate_api_contract.py --repo .
          else
            echo "No dynasty_data_*.json sample found; skipping contract validation."
          fi

      - name: Semantic integrity ratchet gate
        shell: bash
        run: |
          set -Eeuo pipefail
          if ls dynasty_data_*.json >/dev/null 2>&1 || ls data/dynasty_data_*.json >/dev/null 2>&1; then
            python scripts/semantic_ratchet_gate.py --repo .
          else
            echo "No dynasty_data_*.json sample found; skipping semantic ratchet gate."
          fi

      - name: Critical value/trade authority tests
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/run_critical_api_tests.py --repo .

      - name: Validate required deploy entrypoint exists
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ ! -f "deploy/deploy.sh" ]]; then
            echo "::error title=Missing required deploy script::deploy/deploy.sh is required by the deploy job remote execution path but does not exist in this repository."
            echo "::error::Either add deploy/deploy.sh or update deploy strategy/path in .github/workflows/deploy.yml."
            exit 1
          fi

      - name: Deploy script syntax gate (existing scripts only)
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n "deploy/deploy.sh"

          # Syntax-check any additional deploy shell scripts that actually exist.
          for script in deploy/*.sh; do
            [[ -f "${script}" ]] || continue
            [[ "${script}" == "deploy/deploy.sh" ]] && continue
            bash -n "${script}"
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          npm ci

      - name: Install Playwright browser (Chromium)
        shell: bash
        run: |
          set -Eeuo pipefail
          npx playwright install --with-deps chromium

      - name: Seed runtime payload fixture for parity gate
        shell: bash
        run: |
          set -Eeuo pipefail
          FIXTURE="tests/fixtures/runtime_last_good_fixture.json"
          [[ -f "${FIXTURE}" ]] || { echo "::error title=Missing parity fixture::${FIXTURE} not found."; exit 1; }
          mkdir -p data
          cp "${FIXTURE}" "data/runtime_last_good.json"

      - name: Release smoke gate (desktop + phone + tablet)
        shell: bash
        env:
          E2E_JASON_PASSWORD: e2e-local-password
        run: |
          set -Eeuo pipefail
          npm run regression:test:smoke:release

      - name: Release parity gate (desktop + mobile)
        shell: bash
        env:
          E2E_JASON_PASSWORD: e2e-local-password
        run: |
          set -Eeuo pipefail
          npm run regression:test:parity

      - name: Upload release gate artifacts (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-artifacts
          path: |
            playwright-report
            test-results
            tmp/playwright/playwright-report
            tmp/playwright/test-results
            tests/e2e/playwright-report
            tests/e2e/test-results
          if-no-files-found: ignore

  deploy:
    name: Deploy To Hetzner
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 25
    environment: production
    steps:
      - name: Checkout (for post-deploy probes)
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Preflight validate deploy inputs (no SSH)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          PROD_APP_DIR: ${{ vars.PROD_APP_DIR || '/home/dynasty/trade-calculator' }}
          PROD_APP_USER: ${{ vars.PROD_APP_USER || 'dynasty' }}
          PROD_VENV_DIR: ${{ vars.PROD_VENV_DIR || '/home/dynasty/.venvs/trade-calculator' }}
          PROD_DEPLOY_STATE_DIR: ${{ vars.PROD_DEPLOY_STATE_DIR || '/home/dynasty/.deploy-state' }}
          PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE: ${{ vars.PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE || '/home/dynasty/.deploy-state/trade-calculator.last_successful_deploy_commit' }}
          PROD_EXPECTED_DEPLOY_HOST: ${{ vars.PROD_EXPECTED_DEPLOY_HOST || 'riskittogetthebrisket.org' }}
          PROD_EXPECTED_DEPLOY_IP: ${{ vars.PROD_EXPECTED_DEPLOY_IP || '5.161.188.92' }}
          PROD_EXPECTED_DEPLOY_USER: ${{ vars.PROD_EXPECTED_DEPLOY_USER || 'dynasty' }}
          PROD_DEPLOY_KEY_FINGERPRINT_ALLOWLIST: ${{ vars.PROD_DEPLOY_KEY_FINGERPRINT_ALLOWLIST || '' }}
          PROD_SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || 'dynasty' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          require_non_empty() {
            local name="$1"
            local value="${!name:-}"
            if [[ -z "${value}" ]]; then
              echo "::error title=Missing Deploy Configuration::Required secret ${name} is empty or not set."
              exit 1
            fi
          }

          require_non_empty DEPLOY_HOST
          require_non_empty DEPLOY_USER
          require_non_empty DEPLOY_SSH_PRIVATE_KEY
          require_non_empty DEPLOY_KNOWN_HOSTS
          require_non_empty PROD_APP_DIR
          require_non_empty PROD_APP_USER
          require_non_empty PROD_VENV_DIR
          require_non_empty PROD_DEPLOY_STATE_DIR
          require_non_empty PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE
          require_non_empty PROD_EXPECTED_DEPLOY_HOST
          require_non_empty PROD_EXPECTED_DEPLOY_USER

          DEPLOY_HOST_RESOLVED="${DEPLOY_HOST}"
          DEPLOY_USER_RESOLVED="${DEPLOY_USER}"
          DEPLOY_PORT_RESOLVED="${DEPLOY_PORT:-22}"
          DEPLOY_KEY_RESOLVED="${DEPLOY_SSH_PRIVATE_KEY}"
          DEPLOY_KNOWN_HOSTS_RESOLVED="${DEPLOY_KNOWN_HOSTS}"

          if ! [[ "${DEPLOY_PORT_RESOLVED}" =~ ^[0-9]+$ ]]; then
            echo "::error title=Invalid SSH Port::Resolved deploy port must be numeric; got '${DEPLOY_PORT_RESOLVED}'."
            exit 1
          fi

          if ! grep -Eq 'BEGIN [A-Z0-9 ]*PRIVATE KEY' <<<"${DEPLOY_KEY_RESOLVED}"; then
            echo "::error title=Invalid SSH private key::Key does not look like a PEM/OpenSSH private key."
            exit 1
          fi

          if ! grep -Eq '(^|[[:space:]])(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp[0-9]+)|^\|1\|' <<<"${DEPLOY_KNOWN_HOSTS_RESOLVED}"; then
            echo "::error title=Invalid known_hosts::Known hosts data is missing a valid host key entry."
            exit 1
          fi

          if [[ "${DEPLOY_USER_RESOLVED}" != "${PROD_EXPECTED_DEPLOY_USER}" ]]; then
            echo "::warning title=Deploy user differs from expected::DEPLOY_USER=${DEPLOY_USER_RESOLVED}, expected=${PROD_EXPECTED_DEPLOY_USER}"
          fi
          if [[ "${DEPLOY_HOST_RESOLVED}" != "${PROD_EXPECTED_DEPLOY_HOST}" && "${DEPLOY_HOST_RESOLVED}" != "${PROD_EXPECTED_DEPLOY_IP}" ]]; then
            echo "::warning title=Deploy host differs from expected::DEPLOY_HOST=${DEPLOY_HOST_RESOLVED}, expected host=${PROD_EXPECTED_DEPLOY_HOST}, expected ip=${PROD_EXPECTED_DEPLOY_IP}"
          fi

          [[ -n "${DEPLOY_PORT:-}" ]] || echo "DEPLOY_PORT not set; defaulting to 22."

          install -d -m 700 "$HOME/.ssh"
          DEPLOY_KEY_FILE="$HOME/.ssh/id_ed25519"
          DEPLOY_KNOWN_HOSTS_FILE="$HOME/.ssh/known_hosts"
          printf '%s\n' "${DEPLOY_KEY_RESOLVED}" | sed 's/\r$//' > "${DEPLOY_KEY_FILE}"
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS_RESOLVED}" | sed 's/\r$//' > "${DEPLOY_KNOWN_HOSTS_FILE}"
          chmod 600 "${DEPLOY_KEY_FILE}"
          chmod 644 "${DEPLOY_KNOWN_HOSTS_FILE}"
          ssh-keygen -y -f "${DEPLOY_KEY_FILE}" >/dev/null
          DEPLOY_KEY_FINGERPRINT_SHA256="$(ssh-keygen -lf "${DEPLOY_KEY_FILE}" -E sha256 | awk '{print $2}')"
          DEPLOY_KEY_FINGERPRINT_MD5="$(ssh-keygen -lf "${DEPLOY_KEY_FILE}" -E md5 | awk '{print $2}')"
          [[ -n "${DEPLOY_KEY_FINGERPRINT_SHA256}" ]] || { echo "::error title=Fingerprint parsing failed::Could not extract SHA256 fingerprint from DEPLOY_SSH_PRIVATE_KEY."; exit 1; }
          [[ -s "${DEPLOY_KNOWN_HOSTS_FILE}" ]] || { echo "::error title=known_hosts empty::Known hosts secret resolved to an empty file."; exit 1; }
          echo "GitHub DEPLOY_SSH_PRIVATE_KEY fingerprint (SHA256): ${DEPLOY_KEY_FINGERPRINT_SHA256}"
          echo "GitHub DEPLOY_SSH_PRIVATE_KEY fingerprint (MD5): ${DEPLOY_KEY_FINGERPRINT_MD5}"

          if [[ -n "${PROD_DEPLOY_KEY_FINGERPRINT_ALLOWLIST}" ]]; then
            key_match="false"
            IFS=',' read -r -a expected_fps <<<"${PROD_DEPLOY_KEY_FINGERPRINT_ALLOWLIST}"
            for expected_fp in "${expected_fps[@]}"; do
              expected_fp="$(echo "${expected_fp}" | tr -d '[:space:]')"
              [[ -z "${expected_fp}" ]] && continue
              if [[ "${DEPLOY_KEY_FINGERPRINT_SHA256}" == "${expected_fp}" ]]; then
                key_match="true"
                break
              fi
            done
            if [[ "${key_match}" != "true" ]]; then
              echo "::error title=Deploy key fingerprint mismatch::DEPLOY_SSH_PRIVATE_KEY fingerprint ${DEPLOY_KEY_FINGERPRINT_SHA256} not found in PROD_DEPLOY_KEY_FINGERPRINT_ALLOWLIST."
              exit 1
            fi
            echo "Deploy key fingerprint matched PROD_DEPLOY_KEY_FINGERPRINT_ALLOWLIST."
          else
            echo "PROD_DEPLOY_KEY_FINGERPRINT_ALLOWLIST not set; fingerprint check is informational only."
          fi

          if command -v getent >/dev/null 2>&1; then
            HOST_IPV4_LIST="$(getent ahostsv4 "${DEPLOY_HOST_RESOLVED}" | awk '{print $1}' | sort -u | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
            if [[ -n "${HOST_IPV4_LIST}" ]]; then
              echo "Resolved IPv4 for ${DEPLOY_HOST_RESOLVED}: ${HOST_IPV4_LIST}"
              if [[ -n "${PROD_EXPECTED_DEPLOY_IP}" ]] && ! grep -Fqw "${PROD_EXPECTED_DEPLOY_IP}" <<<"${HOST_IPV4_LIST}"; then
                echo "::warning title=Deploy host IP differs from expected::Expected ${PROD_EXPECTED_DEPLOY_IP}, resolved ${HOST_IPV4_LIST}"
              fi
            else
              echo "::warning title=Deploy host has no IPv4 resolution::Could not resolve IPv4 for ${DEPLOY_HOST_RESOLVED} via getent."
            fi
          fi

          {
            echo "DEPLOY_HOST_RESOLVED=${DEPLOY_HOST_RESOLVED}"
            echo "DEPLOY_USER_RESOLVED=${DEPLOY_USER_RESOLVED}"
            echo "DEPLOY_PORT_RESOLVED=${DEPLOY_PORT_RESOLVED}"
            echo "DEPLOY_KEY_FILE=${DEPLOY_KEY_FILE}"
            echo "DEPLOY_KNOWN_HOSTS_FILE=${DEPLOY_KNOWN_HOSTS_FILE}"
            echo "DEPLOY_KEY_FINGERPRINT_SHA256=${DEPLOY_KEY_FINGERPRINT_SHA256}"
          } >> "$GITHUB_ENV"

          echo "Deploy target: ${DEPLOY_USER_RESOLVED}@${DEPLOY_HOST_RESOLVED}:${DEPLOY_PORT_RESOLVED}"
          echo "Remote app dir: ${PROD_APP_DIR}"
          echo "Remote venv dir: ${PROD_VENV_DIR}"
          echo "Remote deploy state dir: ${PROD_DEPLOY_STATE_DIR}"
          echo "Remote last successful deploy commit file: ${PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE}"
          echo "Remote service: ${PROD_SERVICE_NAME}"

      - name: Validate known_hosts entry for target host
        shell: bash
        run: |
          set -Eeuo pipefail
          SSH_PORT="${DEPLOY_PORT_RESOLVED}"
          TARGET_HOST="${DEPLOY_HOST_RESOLVED}"
          if [[ "${SSH_PORT}" == "22" ]]; then
            LOOKUP="${TARGET_HOST}"
          else
            LOOKUP="[${TARGET_HOST}]:${SSH_PORT}"
          fi
          if ! ssh-keygen -F "${LOOKUP}" -f "${DEPLOY_KNOWN_HOSTS_FILE}" >/dev/null 2>&1; then
            echo "::error title=Host key mismatch::No known_hosts entry found for ${LOOKUP}. Recreate DEPLOY_KNOWN_HOSTS with: ssh-keyscan -H -p ${SSH_PORT} ${TARGET_HOST}"
            exit 1
          fi

      - name: SSH preflight (connectivity + remote paths)
        env:
          APP_DIR: ${{ vars.PROD_APP_DIR || '/home/dynasty/trade-calculator' }}
          VENV_DIR: ${{ vars.PROD_VENV_DIR || '/home/dynasty/.venvs/trade-calculator' }}
          DEPLOY_STATE_DIR: ${{ vars.PROD_DEPLOY_STATE_DIR || '/home/dynasty/.deploy-state' }}
          LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE: ${{ vars.PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE || '/home/dynasty/.deploy-state/trade-calculator.last_successful_deploy_commit' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "${APP_DIR}" ]] || { echo "::error title=Missing APP_DIR::PROD_APP_DIR cannot be empty."; exit 1; }
          [[ -n "${VENV_DIR}" ]] || { echo "::error title=Missing VENV_DIR::PROD_VENV_DIR cannot be empty."; exit 1; }
          [[ -n "${DEPLOY_STATE_DIR}" ]] || { echo "::error title=Missing DEPLOY_STATE_DIR::PROD_DEPLOY_STATE_DIR cannot be empty."; exit 1; }
          [[ -n "${LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE}" ]] || { echo "::error title=Missing LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE::PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE cannot be empty."; exit 1; }

          SSH_PORT="${DEPLOY_PORT_RESOLVED}"
          TARGET="${DEPLOY_USER_RESOLVED}@${DEPLOY_HOST_RESOLVED}"
          echo "Testing SSH connectivity to ${TARGET}:${SSH_PORT}"
          ssh \
            -i "${DEPLOY_KEY_FILE}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${DEPLOY_KNOWN_HOSTS_FILE}" \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${SSH_PORT}" \
            "${TARGET}" \
            "set -Eeuo pipefail; \
             echo \"[remote] connected host=\$(hostname) user=\$(id -un)\"; \
             command -v bash >/dev/null || { echo \"[remote] bash not found\" >&2; exit 11; }; \
             command -v git >/dev/null || { echo \"[remote] git not found\" >&2; exit 16; }; \
             command -v python3 >/dev/null || { echo \"[remote] python3 not found\" >&2; exit 17; }; \
             [[ -d \"${APP_DIR}\" ]] || { echo \"[remote] APP_DIR missing: ${APP_DIR}\" >&2; exit 12; }; \
             [[ -d \"${APP_DIR}/.git\" ]] || { echo \"[remote] APP_DIR is not a git repo: ${APP_DIR}\" >&2; exit 13; }; \
             command -v systemctl >/dev/null || { echo \"[remote] systemctl not found\" >&2; exit 15; }; \
             [[ -n \"${VENV_DIR}\" ]] || { echo \"[remote] VENV_DIR is empty\" >&2; exit 18; }; \
             [[ -n \"${DEPLOY_STATE_DIR}\" ]] || { echo \"[remote] DEPLOY_STATE_DIR is empty\" >&2; exit 19; }; \
             [[ -n \"${LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE}\" ]] || { echo \"[remote] LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE is empty\" >&2; exit 24; }; \
             cd \"${APP_DIR}\"; \
             echo \"[remote] preflight pwd\"; \
             pwd; \
             echo \"[remote] preflight git status --short\"; \
             git status --short || true; \
             echo \"[remote] preflight git rev-parse --show-toplevel\"; \
             git rev-parse --show-toplevel; \
             echo \"[remote] preflight checks passed\""

      - name: Run remote deploy script
        env:
          DEPLOY_REF_INPUT: ${{ github.event.inputs.deploy_ref }}
          DEPLOY_TRIGGER: github_actions
          DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          APP_NAME: ${{ vars.PROD_APP_NAME || 'riskittogetthebrisket' }}
          APP_USER: ${{ vars.PROD_APP_USER || 'dynasty' }}
          APP_DIR: ${{ vars.PROD_APP_DIR || '/home/dynasty/trade-calculator' }}
          VENV_DIR: ${{ vars.PROD_VENV_DIR || '/home/dynasty/.venvs/trade-calculator' }}
          DEPLOY_STATE_DIR: ${{ vars.PROD_DEPLOY_STATE_DIR || '/home/dynasty/.deploy-state' }}
          LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE: ${{ vars.PROD_LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE || '/home/dynasty/.deploy-state/trade-calculator.last_successful_deploy_commit' }}
          SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || 'dynasty' }}
          DEPLOY_BRANCH: ${{ vars.PROD_DEPLOY_BRANCH || 'main' }}
          AUTO_ROLLBACK: ${{ vars.PROD_AUTO_ROLLBACK || 'true' }}
          APP_HOST: ${{ vars.PROD_APP_HOST || '127.0.0.1' }}
          APP_PORT: ${{ vars.PROD_APP_PORT || '8000' }}
          PUBLIC_URL: ${{ vars.PROD_PUBLIC_URL || '' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          DEPLOY_REF="${DEPLOY_REF_INPUT:-${GITHUB_SHA}}"
          [[ -n "${DEPLOY_REF}" ]] || { echo "::error title=Missing DEPLOY_REF::Unable to determine deploy ref."; exit 1; }
          if [[ "${DEPLOY_REF}" =~ [[:space:]] ]]; then
            echo "::error title=Invalid DEPLOY_REF::deploy_ref cannot contain whitespace."
            exit 1
          fi

          SSH_PORT="${DEPLOY_PORT_RESOLVED}"
          TARGET="${DEPLOY_USER_RESOLVED}@${DEPLOY_HOST_RESOLVED}"
          echo "Deploying ref '${DEPLOY_REF}' to ${TARGET}:${SSH_PORT}"
          ssh \
            -i "${DEPLOY_KEY_FILE}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o PubkeyAuthentication=yes \
            -o PasswordAuthentication=no \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${DEPLOY_KNOWN_HOSTS_FILE}" \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -p "${SSH_PORT}" \
            "${TARGET}" \
            "bash -s" <<EOF
          set -Eeuo pipefail
          export APP_NAME="${APP_NAME}"
          export APP_USER="${APP_USER}"
          export APP_DIR="${APP_DIR}"
          export VENV_DIR="${VENV_DIR}"
          export DEPLOY_STATE_DIR="${DEPLOY_STATE_DIR}"
          export LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE="${LAST_SUCCESSFUL_DEPLOY_COMMIT_FILE}"
          export SERVICE_NAME="${SERVICE_NAME}"
          export DEPLOY_BRANCH="${DEPLOY_BRANCH}"
          export DEPLOY_REF="${DEPLOY_REF}"
          export DEPLOY_TRIGGER="${DEPLOY_TRIGGER}"
          export DEPLOY_RUN_URL="${DEPLOY_RUN_URL}"
          export AUTO_ROLLBACK="${AUTO_ROLLBACK}"
          export APP_HOST="${APP_HOST}"
          export APP_PORT="${APP_PORT}"
          export PUBLIC_URL="${PUBLIC_URL}"
          [[ -n "\${APP_DIR}" ]] || { echo "[remote] APP_DIR is empty" >&2; exit 20; }
          [[ -d "\${APP_DIR}/.git" ]] || { echo "[remote] APP_DIR is not a git repo: \${APP_DIR}" >&2; exit 21; }
          if [[ ! -f "\${APP_DIR}/deploy/deploy.sh" ]]; then
            echo "[remote] deploy/deploy.sh missing before run; attempting git bootstrap."
            git -C "\${APP_DIR}" fetch --prune --tags origin
            if git -C "\${APP_DIR}" rev-parse --verify --quiet "\${DEPLOY_REF}^{commit}" >/dev/null; then
              git -C "\${APP_DIR}" checkout --force "\${DEPLOY_REF}"
            elif git -C "\${APP_DIR}" rev-parse --verify --quiet "origin/\${DEPLOY_BRANCH}^{commit}" >/dev/null; then
              git -C "\${APP_DIR}" checkout --force "origin/\${DEPLOY_BRANCH}"
            else
              echo "[remote] Unable to resolve \${DEPLOY_REF} or origin/\${DEPLOY_BRANCH} during bootstrap." >&2
              exit 22
            fi
          fi
          [[ -f "\${APP_DIR}/deploy/deploy.sh" ]] || { echo "[remote] Missing deploy script after bootstrap: \${APP_DIR}/deploy/deploy.sh" >&2; exit 23; }
          bash "\${APP_DIR}/deploy/deploy.sh"
          EOF

      - name: Public health smoke test (optional)
        if: ${{ vars.PROD_PUBLIC_URL != '' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --max-time 20 "${{ vars.PROD_PUBLIC_URL }}" >/tmp/public-health.json
          head -c 400 /tmp/public-health.json || true

      - name: Runtime smoke probe (post-deploy)
        if: ${{ vars.PROD_PUBLIC_URL != '' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/runtime_probe.py \
            --base-url "${{ vars.PROD_PUBLIC_URL }}" \
            --mode smoke \
            --strict-health \
            --strict-operator \
            --strict-routes \
            --max-scrape-age-hours "${{ vars.PROD_MAX_HEALTHY_SCRAPE_AGE_HOURS || '10' }}" \
            --output-json "tmp/runtime_probe_post_deploy.json"

      - name: Upload post-deploy probe report
        if: ${{ always() && vars.PROD_PUBLIC_URL != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-probe-post-deploy
          path: tmp/runtime_probe_post_deploy.json
          if-no-files-found: ignore
