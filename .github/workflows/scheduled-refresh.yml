name: Scheduled Data Refresh

# Runs the scraper + canonical rebuild every 3 hours.
# This keeps the site data fresh without manual intervention.
# The scraper itself is idempotent and overwrites CSVs/site_raw/.

on:
  schedule:
    # Every 3 hours at minute 42 (UTC) to avoid thundering herd.
    - cron: "42 */3 * * *"
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: "Skip scraper, only rebuild canonical (for debugging)"
        required: false
        type: boolean
        default: false

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Scrape + Rebuild + Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Playwright browser for scraper
          pip install playwright 2>/dev/null || true
          python -m playwright install chromium 2>/dev/null || true

      - name: Sync Draft Data from Google Sheet
        shell: bash
        run: |
          set -Eeuo pipefail
          # ── Google Sheet → repo sync ──────────────────────────────────
          # The Draft Data workbook lives in Google Sheets and is shared
          # via link ("anyone with the link can view").  We download it
          # every refresh cycle so the app always has current values.
          #
          # Sheet ID extracted from the sharing URL.  If the sheet is
          # ever made private, replace this with a service-account flow
          # and store credentials in GitHub Secrets.
          SHEET_ID="17wa6qdZ1Y8ckb4TIVZ4_C71g0skvtk9UZy43zSFzRlA"

          echo "Downloading Draft Data workbook..."
          HTTP_CODE=$(curl -sL -w "%{http_code}" \
            "https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx" \
            -o "CSVs/Draft Data.xlsx.tmp")

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::warning title=Sheet sync failed::Google Sheets returned HTTP ${HTTP_CODE} — keeping existing workbook"
            rm -f "CSVs/Draft Data.xlsx.tmp"
          else
            SIZE=$(stat -c%s "CSVs/Draft Data.xlsx.tmp" 2>/dev/null || echo 0)
            if (( SIZE < 1000 )); then
              echo "::warning title=Sheet sync suspicious::Downloaded file only ${SIZE} bytes — keeping existing workbook"
              rm -f "CSVs/Draft Data.xlsx.tmp"
            else
              mv "CSVs/Draft Data.xlsx.tmp" "CSVs/Draft Data.xlsx"
              echo "Workbook updated (${SIZE} bytes)"

              # Also export the Draft Data tab as CSV for fallback consumers
              python -c "
          import openpyxl, csv
          wb = openpyxl.load_workbook('CSVs/Draft Data.xlsx', data_only=True)
          ws = wb['Draft Data']
          with open('CSVs/draft_data.csv', 'w', newline='') as f:
              writer = csv.writer(f)
              for row in ws.iter_rows(values_only=True):
                  writer.writerow(['' if v is None else v for v in row])
          wb.close()
          print(f'CSV exported: {ws.max_row} rows')
          "
            fi
          fi

      - name: Run scraper
        if: ${{ inputs.skip_scrape != true }}
        shell: bash
        timeout-minutes: 15
        run: |
          set -Eeuo pipefail
          echo "::group::Scraper output"
          python "Dynasty Scraper.py" 2>&1 || {
            echo "::warning title=Scraper partial failure::Scraper exited non-zero but may have partial data"
          }
          echo "::endgroup::"

          # Mirror scraper site_raw output to the tracked CSVs/ directory
          if [[ -d "exports/latest/site_raw" ]]; then
            mkdir -p CSVs/site_raw
            cp -v exports/latest/site_raw/*.csv CSVs/site_raw/ 2>/dev/null || true
          fi

          # Fetch Dynasty Daddy SF rankings
          python scripts/fetch_dynasty_daddy.py --mirror-data-dir 2>/dev/null || echo "::warning title=Dynasty Daddy fetch failed::Non-fatal — continuing"

          # Verify at least KTC data was produced (primary source)
          if [[ -f "CSVs/site_raw/ktc.csv" ]]; then
            KTC_LINES=$(wc -l < "CSVs/site_raw/ktc.csv")
            echo "KTC CSV: ${KTC_LINES} lines"
            if (( KTC_LINES < 100 )); then
              echo "::error title=KTC data too small::Only ${KTC_LINES} lines in KTC export"
              exit 1
            fi
          else
            echo "::error title=KTC data missing::CSVs/site_raw/ktc.csv not found"
            exit 1
          fi

      - name: Rebuild canonical snapshot
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "::group::Source pull"
          python scripts/source_pull.py --repo .
          echo "::endgroup::"
          echo "::group::Canonical build"
          python scripts/canonical_build.py --repo .
          echo "::endgroup::"

      - name: Verify canonical output
        shell: bash
        run: |
          set -Eeuo pipefail
          # `ls | head -1` is wrapped in `|| true` so the pipe's
          # pipefail exit (from `ls` finding no matches) doesn't kill
          # the script mid-assignment under `set -e`.  Without this,
          # the empty-snapshot case exits with a cryptic `Process
          # completed with exit code 2` and the ::error annotation
          # below never gets a chance to fire.
          SNAP=$(ls -t data/canonical/canonical_snapshot_*.json 2>/dev/null | head -1 || true)
          if [[ -z "$SNAP" ]]; then
            echo "::error title=No canonical snapshot::Canonical rebuild produced no snapshot — check the Rebuild canonical snapshot step's log for a source_pull or canonical_build error."
            exit 1
          fi
          ASSETS=$(python -c "import json; print(len(json.load(open('${SNAP}')).get('assets', [])))")
          echo "Canonical snapshot: ${SNAP} (${ASSETS} assets)"
          if (( ASSETS < 500 )); then
            echo "::error title=Canonical too small::Only ${ASSETS} assets in snapshot"
            exit 1
          fi

      - name: Commit updated data
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f CSVs/ exports/ data/canonical/ data/raw/ data/raw_sources/ data/identity/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: automated data refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi

      - name: Trigger deploy
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          # deploy.yml uses paths-ignore for data/** and exports/**, so
          # data-only pushes will NOT auto-trigger a deploy. Dispatch manually.
          if git log -1 --pretty=%B | grep -q "automated data refresh"; then
            echo "Data updated, dispatching deploy workflow explicitly"
            gh workflow run deploy.yml --ref main
          else
            echo "No data changes, skipping deploy trigger"
          fi

      - name: Report freshness
        if: always()
        shell: bash
        run: |
          echo "## Data Refresh Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | Lines | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for csv in CSVs/site_raw/*.csv; do
            name=$(basename "$csv" .csv)
            lines=$(wc -l < "$csv" 2>/dev/null || echo "0")
            status="OK"
            if (( lines < 10 )); then status="⚠️ LOW"; fi
            echo "| ${name} | ${lines} | ${status} |" >> "$GITHUB_STEP_SUMMARY"
          done
