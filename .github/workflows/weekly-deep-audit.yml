name: Weekly Deep Audit

on:
  schedule:
    - cron: '15 5 * * 1'
  workflow_dispatch:

concurrency:
  group: weekly-deep-audit
  cancel-in-progress: false

jobs:
  deep-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Semantic validation + ratchet gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/semantic_ratchet_gate.py --repo .

      - name: Critical value/trade authority tests
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/run_critical_api_tests.py --repo . --verbose

      - name: Regression-focused API unit tests
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m unittest \
            tests.api.test_automation_policy \
            tests.api.test_identity_resolution \
            tests.api.test_league_route_resilience \
            tests.api.test_promotion_gate \
            tests.api.test_status_compact \
            tests.api.test_value_pipeline_golden -v
