name: PR Validation

# Runs on every pull request to provide pre-merge feedback.
# This is the "preview/staging" gate — validates code quality before merge.
# Production deploy only happens after merge to main (see deploy.yml).

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Python syntax gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m py_compile server.py "Dynasty Scraper.py"
          python -m py_compile src/api/data_contract.py

      - name: Python import gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import fastapi
          import uvicorn
          import requests
          from playwright.async_api import async_playwright
          import server
          print("Runtime import gate passed.")
          PY

      - name: Generate comparison artifact for promotion-readiness test
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/source_pull.py
          python scripts/canonical_build.py
          python scripts/run_comparison_batch.py

      - name: Run unit tests
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest tests/ -x -q --tb=short

      - name: API data contract check
        shell: bash
        run: |
          set -Eeuo pipefail
          if ls dynasty_data_*.json >/dev/null 2>&1 || ls data/dynasty_data_*.json >/dev/null 2>&1; then
            python scripts/validate_api_contract.py --repo .
          else
            echo "No sample data; skipping contract validation."
          fi

      - name: Deploy script syntax gate
        shell: bash
        run: |
          set -Eeuo pipefail
          for script in deploy/*.sh; do
            [[ -f "${script}" ]] || continue
            bash -n "${script}"
          done
