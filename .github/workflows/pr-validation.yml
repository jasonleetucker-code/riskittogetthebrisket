name: PR Validation

# Runs on every pull request to provide pre-merge feedback.
# This is the "preview/staging" gate â€” validates code quality before merge.
# Production deploy only happens after merge to main (see deploy.yml).

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          # requirements-dev.txt chains in requirements.txt via ``-r``,
          # so this single install keeps local dev, CI, and production
          # (runtime-only) walking the same dependency graph.  No
          # ad-hoc ``pip install pytest`` calls sprinkled elsewhere.
          pip install -r requirements-dev.txt

      - name: Validate dependency graph (pip check)
        shell: bash
        run: |
          set -Eeuo pipefail
          pip check

      - name: Preflight environment check
        shell: bash
        run: |
          set -Eeuo pipefail
          python scripts/check_env.py

      - name: Python syntax gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m py_compile server.py "Dynasty Scraper.py"
          python -m py_compile src/api/data_contract.py

      - name: Python import gate
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import fastapi
          import uvicorn
          import requests
          from playwright.async_api import async_playwright
          import server
          print("Runtime import gate passed.")
          PY
      - name: Run unit tests
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pytest tests/ -x -q --tb=short

      - name: API data contract check
        shell: bash
        run: |
          set -Eeuo pipefail
          if ls dynasty_data_*.json >/dev/null 2>&1 || ls data/dynasty_data_*.json >/dev/null 2>&1; then
            python scripts/validate_api_contract.py --repo .
          else
            echo "No sample data; skipping contract validation."
          fi

      - name: Deploy script syntax gate
        shell: bash
        run: |
          set -Eeuo pipefail
          for script in deploy/*.sh; do
            [[ -f "${script}" ]] || continue
            bash -n "${script}"
          done

      # Frontend bundle-size budget gate.  Builds the Next.js app
      # without checks (``build:nocheck``) then explicitly runs the
      # ``check:bundles`` script that compares each page's chunk size
      # against the per-page budget in
      # ``frontend/scripts/check-bundle-sizes.mjs``.  Splitting the
      # build from the check lets us print the full Next.js build
      # output even on success, while the check step's exit code is
      # what determines the gate.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        shell: bash
        working-directory: frontend
        run: |
          set -Eeuo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Frontend build + bundle-size budget
        shell: bash
        working-directory: frontend
        run: |
          set -Eeuo pipefail
          npm run build:nocheck
          npm run check:bundles

