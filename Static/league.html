<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>League – Risk It To Get The Brisket</title>
  <style>
    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --ink: #152033;
      --muted: #5a6778;
      --line: #d6deea;
      --primary: #152033;
      --accent: #c45a1d;
      --green: #2d8a59;
      --amber: #ac7a29;
      --amber-soft: rgba(172, 122, 41, 0.10);
      --red: #c2474f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(900px 340px at 20% -10%, rgba(21, 32, 51, 0.09), transparent 60%),
        radial-gradient(700px 280px at 90% 110%, rgba(196, 90, 29, 0.08), transparent 60%),
        var(--bg);
      color: var(--ink);
      padding: 24px;
    }
    .shell { max-width: 960px; margin: 0 auto; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
    }
    .header h1 { margin: 0; font-size: clamp(1.3rem, 3vw, 1.8rem); letter-spacing: -0.02em; }
    .header .nav { display: flex; gap: 8px; }
    .header a {
      display: inline-block; padding: 8px 14px; border-radius: 9px;
      text-decoration: none; font-weight: 600; font-size: 0.88rem;
      border: 1px solid var(--line); color: var(--ink); background: var(--card);
    }
    .header a.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .subtitle { color: var(--muted); font-size: 0.92rem; margin: 0 0 20px; }

    /* Team cards */
    .teams-grid {
      display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 28px;
    }
    .team-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 16px;
    }
    .team-rank {
      font-weight: 700; font-size: 1.1rem; color: var(--muted);
      min-width: 28px; text-align: center;
    }
    .team-name { font-weight: 700; font-size: 0.92rem; min-width: 110px; }
    .team-bar-wrap {
      flex: 1; background: #f0f3f8; border-radius: 5px; height: 22px;
      position: relative; overflow: hidden;
    }
    .team-bar {
      height: 100%; background: var(--accent); border-radius: 5px;
      transition: width 0.4s ease;
    }
    .team-dollars {
      font-weight: 700; font-size: 0.95rem; min-width: 48px; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .team-picks-count {
      font-size: 0.78rem; color: var(--muted); min-width: 40px; text-align: right;
    }
    .team-picks-list {
      font-size: 0.72rem; color: var(--muted); margin: 2px 0 0 40px;
      padding: 0 16px 4px;
    }
    .traded-pick { color: var(--amber); font-weight: 600; }

    /* Rounds */
    .round-section { margin-bottom: 24px; }
    .round-title {
      font-weight: 700; font-size: 1rem; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .round-total { font-weight: 400; color: var(--muted); font-size: 0.85rem; }
    .table-wrap {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 12px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th {
      background: #f4f6fb; padding: 8px 12px; text-align: left;
      font-weight: 600; font-size: 0.76rem; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--muted); border-bottom: 1px solid var(--line);
    }
    tbody td { padding: 8px 12px; border-bottom: 1px solid #f0f3f8; }
    tbody tr:hover { background: #f8faff; }
    tbody tr.traded { background: var(--amber-soft); }
    .pick-label { font-weight: 700; font-variant-numeric: tabular-nums; }
    .dollar-val { font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }
    .owner-name { font-weight: 600; }
    .from-name { color: var(--amber); font-weight: 600; }
    .rookie-name { font-weight: 500; }
    .rookie-pos {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 0.72rem; font-weight: 600; background: #eef2f7;
    }
    .pos-QB { background: #fde8e8; color: #9b2c2c; }
    .pos-RB { background: #e6f7ee; color: #1a7a3e; }
    .pos-WR { background: #e8f0fd; color: #2956a8; }
    .pos-TE { background: #fef3e2; color: #b8600d; }
    .pos-LB, .pos-EDGE, .pos-S, .pos-DL, .pos-DB { background: #f0e8fd; color: #5b2ca0; }
    .ktc-val { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.82rem; }
    .ktc-val.projected { opacity: 0.5; font-style: italic; }
    .budget-note {
      font-size: 0.82rem; color: var(--muted); margin-top: 8px; padding: 0 4px;
    }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 0.95rem; }
    .error-msg { text-align: center; padding: 30px; color: var(--red); font-size: 0.92rem; }

    @media (max-width: 680px) {
      body { padding: 14px; }
      .team-name { min-width: 80px; font-size: 0.82rem; }
      .team-picks-list { margin-left: 20px; }
      table { font-size: 0.78rem; }
      thead th, tbody td { padding: 6px 8px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <h1>Draft Capital</h1>
      <div class="nav">
        <a href="/">Home</a>
        <a class="primary" href="/?jason=1">Full App Login</a>
      </div>
    </div>
    <p class="subtitle">Auction-dollar pick values from the dynasty draft curve. Pick ownership from Sleeper. Rookie values from KTC.</p>

    <div id="loadingMsg" class="loading">Loading draft capital...</div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div id="teamsSection" style="display:none;">
      <div id="teamsGrid" class="teams-grid"></div>
      <div id="budgetNote" class="budget-note"></div>
    </div>

    <div id="picksSection" style="display:none;margin-top:28px;">
      <div id="picksContent"></div>
    </div>
  </div>

  <script>
    (() => {
      const loadingMsg = document.getElementById('loadingMsg');
      const errorMsg = document.getElementById('errorMsg');
      const teamsSection = document.getElementById('teamsSection');
      const teamsGrid = document.getElementById('teamsGrid');
      const budgetNote = document.getElementById('budgetNote');
      const picksSection = document.getElementById('picksSection');
      const picksContent = document.getElementById('picksContent');

      function posClass(pos) {
        const p = (pos || '').toUpperCase();
        if (['DE','DT','EDGE'].includes(p)) return 'pos-DL';
        if (['CB','SS','FS'].includes(p)) return 'pos-DB';
        return 'pos-' + p;
      }

      function render(data) {
        // ── Team totals ──
        const maxD = Math.max(...data.teamTotals.map(t => t.auctionDollars));
        let html = '';
        for (let i = 0; i < data.teamTotals.length; i++) {
          const t = data.teamTotals[i];
          const pct = maxD > 0 ? (t.auctionDollars / maxD * 100) : 0;
          const teamPicks = data.picks.filter(p => p.currentOwner === t.team);
          const pickLabels = teamPicks.map(p =>
            p.isTraded ? '<span class="traded-pick">' + p.pick + '</span>' : p.pick
          ).join(', ');

          html += '<div class="team-row">' +
            '<div class="team-rank">' + (i + 1) + '</div>' +
            '<div class="team-name">' + t.team + '</div>' +
            '<div class="team-bar-wrap"><div class="team-bar" style="width:' + pct + '%"></div></div>' +
            '<div class="team-dollars">$' + t.auctionDollars + '</div>' +
            '<div class="team-picks-count">' + teamPicks.length + 'pk</div>' +
          '</div>' +
          '<div class="team-picks-list">' + pickLabels + '</div>';
        }
        teamsGrid.innerHTML = html;
        const ktcLabel = data.ktcSource === 'live' ? 'KTC Live' : 'KTC Cached';
        budgetNote.textContent = 'Total budget: $' + data.totalBudget +
          ' across ' + data.numTeams + ' teams, ' + data.draftRounds +
          ' rounds (' + data.season + '). ' + ktcLabel + ': ' +
          data.ktcRookieCount + ' ranked, ' + data.ktcTotalFilled +
          ' filled. Highlighted = traded pick.';
        teamsSection.style.display = '';

        // ── Picks by round ──
        let picksHtml = '';
        for (let round = 1; round <= data.draftRounds; round++) {
          const roundPicks = data.picks.filter(p => p.round === round);
          const roundTotal = roundPicks.reduce((s, p) => s + p.dollarValue, 0);

          picksHtml += '<div class="round-section">' +
            '<div class="round-title">Round ' + round +
            ' <span class="round-total">($' + roundTotal + ')</span></div>' +
            '<div class="table-wrap"><table>' +
            '<thead><tr>' +
            '<th>Pick</th><th>$</th><th>Owner</th><th>From</th>' +
            '<th class="hide-mobile">Rookie</th>' +
            '<th class="hide-mobile">Pos</th>' +
            '<th class="hide-mobile">KTC</th>' +
            '</tr></thead><tbody>';

          for (const pick of roundPicks) {
            const cls = pick.isTraded ? ' class="traded"' : '';
            const from = pick.isTraded
              ? '<span class="from-name">' + pick.originalOwner + '</span>'
              : '<span style="color:var(--muted);">—</span>';
            const isProjected = pick.rookieName && pick.rookieName.startsWith('Rookie #');
            const rookie = pick.rookieName
              ? (isProjected ? '<span style="color:var(--muted);font-style:italic;">' + pick.rookieName + '</span>' : pick.rookieName)
              : '<span style="color:var(--muted);">—</span>';
            const pos = pick.rookiePos
              ? '<span class="rookie-pos ' + posClass(pick.rookiePos) + '">' + pick.rookiePos + '</span>'
              : '';
            const ktc = pick.rookieKtcValue
              ? '<span class="ktc-val' + (isProjected ? ' projected' : '') + '">' + pick.rookieKtcValue.toLocaleString() + (isProjected ? '*' : '') + '</span>'
              : '';

            picksHtml += '<tr' + cls + '>' +
              '<td class="pick-label">' + pick.pick + '</td>' +
              '<td class="dollar-val">$' + pick.dollarValue + '</td>' +
              '<td class="owner-name">' + pick.currentOwner + '</td>' +
              '<td>' + from + '</td>' +
              '<td class="hide-mobile rookie-name">' + rookie + '</td>' +
              '<td class="hide-mobile">' + pos + '</td>' +
              '<td class="hide-mobile">' + ktc + '</td>' +
            '</tr>';
          }
          picksHtml += '</tbody></table></div></div>';
        }
        picksContent.innerHTML = picksHtml;
        picksSection.style.display = '';
      }

      async function load() {
        try {
          const resp = await fetch('/api/draft-capital');
          if (!resp.ok) throw new Error('API returned ' + resp.status);
          const data = await resp.json();
          if (data.error) throw new Error(data.error);
          loadingMsg.style.display = 'none';
          render(data);
        } catch (err) {
          loadingMsg.style.display = 'none';
          errorMsg.textContent = 'Could not load draft capital: ' + err.message;
          errorMsg.style.display = '';
        }
      }

      load();
    })();
  </script>
</body>
</html>
