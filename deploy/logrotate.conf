# /etc/logrotate.d/riskit — symlink this file from the deploy
# script (deploy/post_deploy.sh handles it).
#
# Rotates both the FastAPI backend log and the Next.js frontend log.
# 14-day retention with gzip.  logrotate runs daily via cron.
#
# Use `logrotate -d /etc/logrotate.d/riskit` to dry-run before
# flipping.

/var/log/dynasty.log /var/log/dynasty-frontend.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
    su root root
    postrotate
        # No SIGHUP needed — we use copytruncate so the app keeps
        # writing to the same inode.  If we ever switch to rename
        # semantics, add:
        #   systemctl reload dynasty dynasty-frontend
        /bin/true
    endscript
}
