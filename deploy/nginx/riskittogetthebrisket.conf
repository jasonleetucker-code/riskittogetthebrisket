# Nginx reverse proxy for riskittogetthebrisket.org
# Install: sudo cp deploy/nginx/riskittogetthebrisket.conf /etc/nginx/sites-available/
#          sudo ln -s /etc/nginx/sites-available/riskittogetthebrisket.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream dynasty_backend {
    server 127.0.0.1:8000;
    keepalive 4;
}

server {
    listen 80;
    listen [::]:80;
    server_name riskittogetthebrisket.org www.riskittogetthebrisket.org;

    # Certbot will add HTTPS redirect here automatically.
    # After running certbot, this block becomes a 301 redirect.

    location / {
        proxy_pass http://dynasty_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed for HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache static assets served by FastAPI
    location /static/ {
        proxy_pass http://dynasty_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (no logging noise)
    location = /api/health {
        proxy_pass http://dynasty_backend;
        access_log off;
    }
}
